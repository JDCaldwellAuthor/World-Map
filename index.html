<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World Map & Music Player</title>
    
    <!-- 1. External dependencies for visual map overlays -->
    <script src="https://jquery.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #d4af37; /* Metallic Gold */
            margin-bottom: 5px;
        }
        .map-outer-wrapper {
            max-width: 1000px; /* Limits max site width */
            margin: 20px auto;
            padding: 0 15px;
        }
        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 3px solid #8c6d31;
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }
        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Info Panel */
        #info-panel {
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            border: 1px solid #8c6d31;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #region-name {
            color: #d4af37;
            margin-top: 0;
        }
        audio {
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>
 
    <h1>Explore the Realm</h1>
    <p>Tap a glowing region to read its history and listen to its ancient theme music.</p>

    <div class="map-outer-wrapper">
        <div class="map-container">
            <!-- 2. Integrated usemap attribute and original aspect resolution properties -->
            <img id="realm-map" src="world-map.jpg" usemap="#image-map" alt="Trilogy World Map" width="4000" height="2500">
           
            <!-- 3. Complete Polygon maps with unique alt targets and specialized onclick rules -->
            <map name="image-map">
                <!-- Region 1: Ionia -->
                <area shape="poly" 
                      coords="1032,1590,1148,1940,1230,2226,1367,2283,1516,2208,1618,2184,1739,2138,1795,2042,1830,1926,1890,1845,1986,1767,2042,1682,1961,1636,1788,1604,1664,1580,1484,1587,1251,1580,1138,1548,1074,1537" 
                      alt="Ionia" 
                      title="Ionia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Ionia', 'track1.mp3', 'Lore description for Ionia.')">
                   
                <!-- Region 2: Doria -->
                <area shape="poly" 
                      coords="883,1406,982,1523,1074,1505,1163,1516,1343,1537,1530,1537,1710,1544,1898,1572,2085,1580,2170,1580,2088,1470,1961,1403,1802,1364,1615,1343,1329,1346,1134,1343" 
                      alt="Doria" 
                      title="Doria" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Doria', 'track2.mp3', 'Lore description for Doria.')">
                   
                <!-- Region 3: Phrygia -->
                <area shape="poly" 
                      coords="795,1177,929,1300,1141,1276,1378,1254,1481,1293,1647,1258,1799,1265,1929,1283,2064,1314,2208,1367,2371,1459,2484,1530,2569,1544,2640,1498,2590,1389,2498,1314,2332,1219,2265,1152,2216,1071,2110,1007,2007,1035,1845,1053,1714,1018,1509,1007" 
                      alt="Phrygia" 
                      title="Phrygia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Phrygia', 'track3.mp3', 'Lore description for Phrygia.')">

                <!-- Region 4: Mixolydia -->
                <area shape="poly" 
                      coords="1996,343,2011,565,2113,784,2177,898,2283,919,2332,873,2399,820,2456,756,2530,707,2601,675,2668,657,2703,611,2643,548,2562,449,2502,392,2495,322,2364,300,2233,314,2113,297" 
                      alt="Mixolydia" 
                      title="Mixolydia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Mixolydia', 'track4.mp3', 'Lore description for Mixolydia.')">

                <!-- Region 5: Lydia -->
                <area shape="poly" 
                      coords="509,336,502,484,481,675,488,845,512,968,640,1032,784,1088,986,1049,1155,1021,1357,975,1481,961,1643,951,1777,965,1883,965,1961,954,1943,816,1919,703,1862,625,1770,516,1678,438,1625,353,1562,279,1445,293,1325,254,1201,272,1060,261,883,272,707,297" 
                      alt="Lydia" 
                      title="Lydia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Lydia', 'track5.mp3', 'Lore description for Lydia.')">

                <!-- Region 6: Aeolia (Audio Omitted) -->
                <area shape="poly" 
                      coords="2834,367,2802,428,2714,477,2700,512,2735,572,2756,633,2710,678,2640,703,2576,717,2519,749,2473,813,2406,869,2382,936,2364,989,2364,1046,2382,1102,2413,1131,2466,1163,2558,1191,2661,1223,2781,1226,2862,1212,2936,1212,3025,1237,3117,1254,3244,1272,3406,1307,3562,1332,3693,1329,3749,1336,3767,1223,3792,1124,3834,1081,3880,1011,3933,922,3943,802,3940,710,3929,590,3905,502,3873,435,3813,367,3717,336,3643,343,3576,353,3488,353,3392,353,3325,378,3226,382,3134,371,3067,343,2996,367,2912,364" 
                      alt="Aeolia" 
                      title="Aeolia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Aeolia', '', 'Lore description for Aeolia.')">

                <!-- Region 7: Locria (Audio Omitted) -->
                <area shape="poly" 
                      coords="2622,1286,2675,1375,2731,1470,2784,1548,2866,1608,2933,1650,3000,1746,3032,1820,3071,1929,3078,2007,3095,2081,3092,2163,3092,2226,3152,2311,3216,2357,3297,2382,3378,2396,3491,2382,3555,2367,3611,2322,3629,2226,3643,2127,3682,2053,3693,1958,3721,1876,3739,1788,3749,1703,3731,1594,3717,1505,3700,1428,3647,1375,3495,1378,3304,1353,3208,1322,3014,1300,2905,1297,2813,1286,2717,1279" 
                      alt="Locria" 
                      title="Locria" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Locria', '', 'Lore description for Locria.')">
            </map>
        </div>
    </div>

    <!-- The Dynamic Audio & Info Panel -->
    <div id="info-panel">
        <h3 id="region-name">Select a Region</h3>
        <p id="region-description">Click a location on the map to begin your journey.</p>
        <audio id="map-audio" controls loop>
            <source id="audio-source" src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        // 4. Enhanced playback tracking logic to allow silent map zones smoothly
        function playRegion(name, audioPath, description) {
            document.getElementById('region-name').innerText = name;
            document.getElementById('region-description').innerText = description;
           
            const audioPlayer = document.getElementById('map-audio');
            const audioSource = document.getElementById('audio-source');
           
            if (audioPath && audioPath !== '') {
                audioSource.src = audioPath;
                audioPlayer.load();
                audioPlayer.play().catch(function(error) {
                    console.log("Autoplay blocked by browser. User must click play manually.");
                });
            } else {
                // Instantly halts music systems if entering unmapped zone layers
                audioPlayer.pause();
                audioSource.src = '';
                audioPlayer.load();
            }
        }

        // 5. ImageMapster framework engine bindings (Styling, Lighting, Sizing)
        $(document).ready(function() {
            var $map = $('#realm-map');

            $map.mapster({
                // Interactive hover state parameters matching theme colors
                fillColor: 'd4af37',   
                fillOpacity: 0.5,      
                stroke: true,          
                strokeColor: 'ffd700', 
                strokeWidth: 2,        
                singleSelect: false,   // Keeps the base glow visible for all regions concurrently
                mapKey: 'alt',         
                scaleMap: true,

                // Background passive glow rules applied automatically on asset startup
                render_select: {
                    fillColor: 'd4af37',
                    fillOpacity: 0.15,   
                    stroke: true,
                    strokeColor: '8c6d31',
                    strokeWidth: 1.5     
                }
            });

            // Forces background canvas illumination onto your seven designated areas
            $map.mapster('set', true, 'Ionia,Doria,Phrygia,Mixolydia,Lydia,Aeolia,Locria');

            // Responsive listener coordinates resizing bounds perfectly dynamically
            $(window).on('resize', function() {
                var containerWidth = $('.map-container').width();
                $map.mapster('resize', containerWidth);
            });
        });
    </script>
</body>
</html>
