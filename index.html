<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World Map & Music Player</title>
    
    <!-- External dependencies for visual map overlays -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mapster@2.4.33/jquery.imagemapresizer.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #d4af37; /* Metallic Gold */
            margin-bottom: 5px;
        }
        .map-outer-wrapper {
            max-width: 1000px; /* Limits max site width */
            margin: 20px auto;
            padding: 0 15px;
            position: relative;
        }
        
        /* Interactive Map Container with default flickering styles */
        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 115, 37, 0.15);
            border: 3px solid #8c6d31;
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
            transition: box-shadow 0.5s ease;
        }

        /* Active fire animation state classes */
        .map-container.flicker-active {
            animation: hearthFlicker 4s infinite ease-in-out;
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Ambient orange fire casting overlay mask */
        .map-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicks to pass through to mapster canvas */
            background: radial-gradient(circle at 20% 80%, rgba(212, 115, 37, 0.18) 0%, rgba(0,0,0,0.4) 80%);
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .map-container.flicker-active::after {
            opacity: 1;
            animation: fireGlow 5s infinite alternate ease-in-out;
        }

        /* Thematic Toggle Controls Styling */
        .controls-panel {
            margin: 15px auto;
        }
        .toggle-btn {
            background-color: #1e1e1e;
            color: #b3922e;
            border: 1px solid #8c6d31;
            padding: 8px 16px;
            font-family: 'Georgia', serif;
            font-size: 13px;
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            color: #ffd700;
            border-color: #ffd700;
            background-color: #262626;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .toggle-btn.disabled {
            color: #777;
            border-color: #444;
            box-shadow: none;
        }

        /* Info Panel Visual Layout - Styled Floating parchment panel */
        #info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10; /* Lifts it completely above the map texture and canvas lines */
            max-width: 320px;
            padding: 20px;
            background: #f2e6ce; /* Classic Antique Parchment Paper Background */
            border: 2px solid #8c6d31;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 40px rgba(139,90,43,0.15);
            text-align: left;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.95;
        }

        /* Subtle hover adjustment to make the card feel interactive */
        #info-panel:hover {
            opacity: 1;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8), inset 0 0 40px rgba(139,90,43,0.25);
        }

        /* High-contrast dark ink typography optimized for parchment readability */
        #region-name {
            color: #5c3a21 !important; /* Rich Dark Sepia Ink */
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 1px dashed #8c6d31;
            padding-bottom: 5px;
        }

        #region-description {
            color: #2b1d0c; /* Deep Charcoal Brown text */
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* Native Media Player Stylings tailored to look clean on parchment backgrounds */
        #map-audio {
            margin-top: 5px;
            width: 100%;
            height: 36px;
            border-radius: 4px;
            filter: sepia(0.4) contrast(0.9) brightness(0.95); /* Tints player layout to blend with map paper */
        }

        /* Natural Organic Firelight Animation Loops */
        @keyframes hearthFlicker {
            0%, 100% { filter: brightness(0.95) contrast(1.02); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 25px rgba(212, 115, 37, 0.15); }
            12% { filter: brightness(1.03) contrast(0.98); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 35px rgba(212, 115, 37, 0.22); }
            28% { filter: brightness(0.92) contrast(1.05); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(212, 115, 37, 0.12); }
            45% { filter: brightness(1.05) contrast(0.97); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 40px rgba(212, 115, 37, 0.28); }
            62% { filter: brightness(0.97) contrast(1.01); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 28px rgba(212, 115, 37, 0.18); }
            77% { filter: brightness(1.02) contrast(0.99); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 33px rgba(212, 115, 37, 0.24); }
            89% { filter: brightness(0.94) contrast(1.03); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 22px rgba(212, 115, 37, 0.14); }
        }

        @keyframes fireGlow {
            0% { opacity: 0.75; transform: scale(1); }
            100% { opacity: 1.15; transform: scale(1.02); }
        }

        /* Mobile Responsive Scaling: Stacks the card underneath on tight screens */
        @media (max-width: 600px) {
            #info-panel {
                position: relative;
                bottom: auto;
                right: auto;
                max-width: 100%;
                margin: 20px auto 0 auto;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body>
 
    <h1>Explore the Realm</h1>
    <p>Tap a glowing region to read its history and listen to its ancient theme.</p>

    <!-- Interactive Atmosphere Switch Wrapper -->
    <div class="controls-panel">
        <button id="flicker-toggle" class="toggle-btn" onclick="toggleAtmosphere()">🔥 Hearth Flicker: On</button>
    </div>

    <div class="map-outer-wrapper">
        <!-- Interactive map container with default flickering active -->
        <div id="canvas-wrapper" class="map-container flicker-active">
            <img id="realm-map" src="world-map.jpg" usemap="#image-map" alt="Trilogy World Map" width="4000" height="2500">
           
            <map name="image-map">
                <!-- Region 1: Ionia -->
                <area shape="poly" 
                      coords="1032,1590,1148,1940,1230,2226,1367,2283,1516,2208,1618,2184,1739,2138,1795,2042,1830,1926,1890,1845,1986,1767,2042,1682,1961,1636,1788,1604,1664,1580,1484,1587,1251,1590" 
                      alt="Ionia" 
                      title="Ionia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Ionia', 'track1.mp3', 'A land abounding in peace and good harvests.')">
                   
                <!-- Region 2: Doria -->
                <area shape="poly" 
                      coords="883,1406,982,1523,1074,1505,1163,1516,1343,1537,1530,1537,1710,1544,1898,1572,2085,1580,2170,1580,2088,1470,1961,1403,1802,1364,1615,1343,1329,1346,1134,1343" 
                      alt="Doria" 
                      title="Doria" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Doria', 'track2.mp3', 'A foreboding wood full of mystery and dread.')">
                   
                <!-- Region 3: Phrygia -->
                <area shape="poly" 
                      coords="795,1177,929,1300,1141,1276,1378,1254,1481,1293,1647,1258,1799,1265,1929,1283,2064,1314,2208,1367,2371,1459,2484,1530,2569,1544,2640,1498,2590,1389,2498,1314,2332,1265,2198,1173,2042,1102,1909,1088,1777,1109,1643,1111,1481,1099,1319,1075,1155,1075" 
                      alt="Phrygia" 
                      title="Phrygia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Phrygia', 'track3.mp3', 'An inhospitable mountain region.')">

                <!-- Region 4: Mixolydia -->
                <area shape="poly" 
                      coords="1996,343,2011,565,2113,784,2177,898,2283,919,2332,873,2399,820,2456,756,2530,707,2601,675,2668,657,2703,611,2643,548,2562,449,2502,392,2495,322,2364,300,2233,314,2113,322,2011,329" 
                      alt="Mixolydia" 
                      title="Mixolydia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Mixolydia', 'track4.mp3', 'An established kingdom.')">

                <!-- Region 5: Lydia -->
                <area shape="poly" 
                      coords="509,336,502,484,481,675,488,845,512,968,640,1032,784,1088,986,1049,1155,1021,1357,975,1481,961,1643,951,1777,965,1883,965,1961,954,1943,816,1919,703,1862,625,1770,519,1643,470,1481,442,1319,425,1155,406,986,379,808,364" 
                      alt="Lydia" 
                      title="Lydia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Lydia', 'track5.mp3', 'A vast desert.')">

                <!-- Region 6: Aeolia (Audio Silenced) -->
                <area shape="poly" 
                      coords="2834,367,2802,428,2714,477,2700,512,2735,572,2756,633,2710,678,2640,703,2576,717,2519,749,2473,813,2406,869,2382,936,2364,989,2364,1046,2382,1102,2413,1131,2466,1163,2519,1155,2576,1131,2625,1088,2668,1021,2696,940,2717,849,2717,756,2703,665,2675,584,2640,512,2601,441,2562,379,2919,367" 
                      alt="Aeolia" 
                      title="Aeolia" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Aeolia', '', '???')">

                <!-- Region 7: Locria (Audio Silenced) -->
                <area shape="poly" 
                      coords="2622,1286,2675,1375,2731,1470,2784,1548,2866,1608,2933,1650,3000,1746,3032,1820,3071,1929,3078,2007,3095,2081,3092,2163,3092,2226,3152,2311,3216,2357,3297,2382,3378,2368,3445,2297,3484,2198,3513,2088,3527,1961,3520,1845,3484,1746,3434,1659,3378,1589,3319,1533,3255,1489,3186,1459,3112,1441,3034,1437,2955,1445,2878,1461,2802,1489,2731,1525" 
                      alt="Locria" 
                      title="Locria" 
                      href="javascript:void(0);" 
                      onclick="playRegion('Locria', '', 'It is accursed...let us not speak of it.')">
            </map>

            <!-- Info Panel positioned inside map-container -->
            <div id="info-panel">
                <h3 id="region-name">Select a Region</h3>
                <p id="region-description">Click a location on the map to begin your journey.</p>
                <audio id="map-audio" controls loop>
                    <source id="audio-source" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

    <script>
        // Handle region selection and audio playback
        function playRegion(name, audioPath, description) {
            document.getElementById('region-name').innerText = name;
            document.getElementById('region-description').innerText = description;
           
            const audioPlayer = document.getElementById('map-audio');
            const audioSource = document.getElementById('audio-source');
           
            if (audioPath && audioPath !== '') {
                audioSource.src = audioPath;
                audioPlayer.load();
                audioPlayer.play().catch(function(error) {
                    console.log("Autoplay blocked by browser. User must click play manually.");
                });
            } else {
                audioPlayer.pause();
                audioSource.src = '';
                audioPlayer.load();
            }
        }

        // Toggle hearth flicker animation
        function toggleAtmosphere() {
            const mapContainer = document.getElementById('canvas-wrapper');
            const button = document.getElementById('flicker-toggle');
            
            mapContainer.classList.toggle('flicker-active');
            
            if (mapContainer.classList.contains('flicker-active')) {
                button.innerText = '🔥 Hearth Flicker: On';
            } else {
                button.innerText = '🔥 Hearth Flicker: Off';
            }
        }
    </script>
</body>
</html>
