<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World Map & Music Player</title>
    
    <!-- 1. External dependencies for visual map overlays -->
    <script src="https://jquery.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #d4af37; /* Metallic Gold */
            margin-bottom: 5px;
        }
        .map-outer-wrapper {
            max-width: 1000px; /* Limits max site width */
            margin: 20px auto;
            padding: 0 15px;
        }
        
        /* 2. Interactive Map Container with default flickering styles */
        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 115, 37, 0.15);
            border: 3px solid #8c6d31;
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
            transition: box-shadow 0.5s ease;
        }

        /* Active fire animation state classes */
        .map-container.flicker-active {
            animation: hearthFlicker 4s infinite ease-in-out;
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Ambient orange fire casting overlay mask */
        .map-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicks to pass through to mapster canvas */
            background: radial-gradient(circle at 20% 80%, rgba(212, 115, 37, 0.18) 0%, rgba(0,0,0,0.4) 80%);
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .map-container.flicker-active::after {
            opacity: 1;
            animation: fireGlow 5s infinite alternate ease-in-out;
        }

        /* 3. Thematic Toggle Controls Styling */
        .controls-panel {
            margin: 15px auto;
        }
        .toggle-btn {
            background-color: #1e1e1e;
            color: #b3922e;
            border: 1px solid #8c6d31;
            padding: 8px 16px;
            font-family: 'Georgia', serif;
            font-size: 13px;
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            color: #ffd700;
            border-color: #ffd700;
            background-color: #262626;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .toggle-btn.disabled {
            color: #777;
            border-color: #444;
            box-shadow: none;
        }

        /* 4. Info Panel Visual Layout */
        #info-panel {
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            border: 1px solid #8c6d31;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #region-name {
            color: #d4af37;
            margin-top: 0;
        }
        audio {
            margin-top: 15px;
            width: 100%;
        }

        /* 5. Natural Organic Firelight Animation Loops */
        @keyframes hearthFlicker {
            0%, 100% { filter: brightness(0.95) contrast(1.02); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 25px rgba(212, 115, 37, 0.15); }
            12% { filter: brightness(1.03) contrast(0.98); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 35px rgba(212, 115, 37, 0.22); }
            28% { filter: brightness(0.92) contrast(1.05); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(212, 115, 37, 0.12); }
            45% { filter: brightness(1.05) contrast(0.97); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 40px rgba(212, 115, 37, 0.28); }
            62% { filter: brightness(0.97) contrast(1.01); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 28px rgba(212, 115, 37, 0.18); }
            77% { filter: brightness(1.02) contrast(0.99); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 33px rgba(212, 115, 37, 0.24); }
            89% { filter: brightness(0.94) contrast(1.03); box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 22px rgba(212, 115, 37, 0.14); }
        }

        @keyframes fireGlow {
            0% { opacity: 0.75; transform: scale(1); }
            100% { opacity: 1.15; transform: scale(1.02); }
        }
    </style>
</head>
